<style>
  .mode-landscape .sl-layout { flex-direction: row; }
  .mode-portrait .sl-layout { flex-direction: column; }
  .mode-landscape .sl-text-col { width: 55%; height: 100%; }
  .mode-landscape .sl-img-col  { width: 45%; height: 100%; }
  .mode-portrait  .sl-text-col { width: 100%; height: 58%; }
  .mode-portrait  .sl-img-col  { width: 100%; height: 42%; }
</style>
<section class="w-full h-full overflow-hidden bg-white">
  <div class="sl-layout w-full h-full flex">

    <!-- Left: Text column -->
    <div class="sl-text-col flex flex-col justify-between p-12">

      <!-- Top: wordmark + headline + tagline + chips -->
      <div>
        <!-- Wordmark -->
        <div class="flex items-center gap-2 mb-10">
          <div class="flex items-center justify-center w-9 h-9 rounded-xl" style="background:#4a9e8a;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <span class="font-bold text-sm tracking-widest uppercase" style="color:#1a2e2b; letter-spacing:0.14em;">HomeWise</span>
        </div>

        <!-- Headline -->
        <h1 class="font-bold mb-5" style="font-size:2.5rem; color:#1a2e2b; line-height:1.05; letter-spacing:-0.03em;">
          Your Space,<br>
          <span style="color:#4a9e8a;">Working</span><br>
          For You.
        </h1>

        <!-- Tagline -->
        <p class="mb-8" style="font-size:0.9rem; color:#4a5c58; line-height:1.75; max-width:330px;">
          Practical ergonomics and home improvements that make everyday life more comfortable — no designer, no big budget required.
        </p>

        <!-- Topic chips -->
        <div class="flex flex-wrap gap-2">
          <span class="px-3 py-1 rounded-full text-xs font-semibold" style="background:#e8f4f1; color:#2d6b5e; border:1px solid #b8dcd7;">Ergonomics</span>
          <span class="px-3 py-1 rounded-full text-xs font-semibold" style="background:#e8f4f1; color:#2d6b5e; border:1px solid #b8dcd7;">Organization</span>
          <span class="px-3 py-1 rounded-full text-xs font-semibold" style="background:#e8f4f1; color:#2d6b5e; border:1px solid #b8dcd7;">Interior Tips</span>
        </div>
      </div>

      <!-- Bottom: attribution -->
      <div>
        <div class="mb-3" style="width:32px; height:2px; border-radius:2px; background:#4a9e8a;"></div>
        <data-attribution />
      </div>
    </div>

    <!-- Right: Image column -->
    <div class="sl-img-col relative overflow-hidden" style="background:#c5e0db;">
      <img
        src="https://api-stag.qb-deck.quantumbyte.ai/common/image-generation?prompt=bright%20minimal%20home%20workspace%20organized%20wooden%20desk%20indoor%20plants%20natural%20light%20clean%20sage%20teal%20accents%20editorial%20photography%20airy"
        alt="Clean organized home workspace"
        class="w-full h-full object-cover"
      />
      <!-- Floating badge -->
      <div class="absolute bottom-7 left-7">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-semibold" style="background:rgba(255,255,255,0.92); color:#1a2e2b;">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#4a9e8a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Practical · Actionable · Free to start
        </div>
      </div>
    </div>

  </div>
</section>
